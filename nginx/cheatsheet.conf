# HTTP → redirect everything to canonical HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name cheetsheet.tech www.cheetsheet.tech cheat.rivanair.in;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://cheetsheet.tech$request_uri; }
}

# www → canonical redirect (uses cheetsheet.tech cert which covers www)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.cheetsheet.tech;
    ssl_certificate /etc/letsencrypt/live/cheetsheet.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cheetsheet.tech/privkey.pem;
    return 301 https://cheetsheet.tech$request_uri;
}

# Old domain → redirect (uses old cert which covers cheat.rivanair.in)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cheat.rivanair.in;
    ssl_certificate /etc/letsencrypt/live/cheat.rivanair.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cheat.rivanair.in/privkey.pem;
    return 301 https://cheetsheet.tech$request_uri;
}

# Canonical — serve the app
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cheetsheet.tech;

    ssl_certificate /etc/letsencrypt/live/cheetsheet.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cheetsheet.tech/privkey.pem;

    client_max_body_size 50M;
    # Normalize trailing-dot FQDN (cheetsheet.tech. -> cheetsheet.tech)
    # Browsers treat them as separate origins for cookie scoping, breaking OAuth PKCE.
    if ($http_host ~ "\.$") { return 301 https://cheetsheet.tech$request_uri; }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
